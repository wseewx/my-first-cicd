name: CI/CD for Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Обновлено до v4

    - name: Setup Python
      uses: actions/setup-python@v5 # Обновлено до v5
      with:
        python-version: '3.10'

    - name: Run tests
      run: python test.py

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    # ВАЖНО: Добавляем права на запись, иначе деплой упадет с ошибкой
    permissions:
      contents: write 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Обновлено до v4

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4 # Обновлено до v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./ 
